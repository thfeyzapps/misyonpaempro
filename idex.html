<style>
  :root{
    --bg-1:#0d1220; --bg-2:#151b2e;
    --card:#1b2236; --line:rgba(255,255,255,.09);
    --ink:#eef1f8; --muted:#9aa3b8;
    --accent:#5b8cff; --accent-2:#7b5bff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:
      radial-gradient(900px 500px at 15% -10%, rgba(91,140,255,.18), transparent 60%),
      radial-gradient(700px 500px at 110% 20%, rgba(123,91,255,.16), transparent 55%),
      linear-gradient(160deg,var(--bg-1),var(--bg-2));
    color:var(--ink);
    min-height:100dvh; display:grid; place-items:center; padding:24px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%; max-width:400px;
    background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,0)) , var(--card);
    border:1px solid var(--line); border-radius:24px;
    padding:36px 28px 30px; text-align:center;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.7);
  }
  .icon{
    width:78px; height:78px; border-radius:20px; margin:0 auto 18px;
    display:grid; place-items:center; overflow:hidden;
    background:linear-gradient(140deg,var(--accent),var(--accent-2));
    font-size:34px; font-weight:800; color:#fff;
    box-shadow:0 12px 30px -8px rgba(91,140,255,.6);
  }
  .icon img{width:100%;height:100%;object-fit:cover}
  h1{font-size:23px; font-weight:700; letter-spacing:-.02em}
  .tagline{color:var(--muted); font-size:15px; margin-top:6px}

  /* Mobil: yönlendirme durumu */
  #redirecting{display:none; margin-top:26px}
  .spinner{
    width:26px;height:26px;margin:0 auto 12px;border-radius:50%;
    border:3px solid rgba(255,255,255,.15); border-top-color:var(--accent);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  #redirecting p{color:var(--muted); font-size:14px}
  #redirecting a{color:var(--accent); text-decoration:none}

  /* Masaüstü: mağaza butonları + QR */
  #stores{display:none; margin-top:26px}
  .badges{display:flex; flex-direction:column; gap:12px}
  .badge{
    display:flex; align-items:center; gap:12px; justify-content:center;
    padding:13px 18px; border-radius:14px; border:1px solid var(--line);
    background:#0f1424; color:var(--ink); text-decoration:none;
    font-weight:600; font-size:15px; transition:.15s;
  }
  .badge:hover{border-color:var(--accent); transform:translateY(-1px)}
  .badge small{display:block; font-size:11px; font-weight:500; color:var(--muted); line-height:1.1}
  .badge .txt{text-align:left}
  .badge svg{flex-shrink:0}

  .qr-wrap{margin-top:24px; padding-top:22px; border-top:1px solid var(--line)}
  .qr-wrap p{color:var(--muted); font-size:13px; margin-bottom:14px}
  #qr{width:150px;height:150px;margin:0 auto;background:#fff;padding:10px;border-radius:14px}
  #qr img,#qr canvas{display:block;border-radius:6px}

  footer{margin-top:22px;color:var(--muted);font-size:12px}
  footer a{color:var(--muted)}
</style>
</head>
<body>
  <main class="card">
    <div class="icon" id="appIcon"></div>
    <h1 id="appName">Uygulama</h1>
    <p class="tagline" id="tagline"></p>

    <!-- Mobilde otomatik yönlendirme sırasında -->
    <div id="redirecting">
      <div class="spinner"></div>
      <p>Mağazaya yönlendiriliyorsunuz…<br>
        <a href="#" id="manualLink">Yönlenmediyseniz buraya dokunun</a>
      </p>
    </div>

    <!-- Masaüstünde / bilinmeyen cihazda -->
    <div id="stores">
      <div class="badges">
        <a class="badge" id="btnIos" href="#">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16.365 1.43c0 1.14-.417 2.2-1.11 2.98-.746.84-1.96 1.49-3.09 1.4-.13-1.11.42-2.28 1.09-3.02.75-.83 2.05-1.45 3.11-1.36zM20.6 17.02c-.55 1.27-.81 1.83-1.52 2.95-.99 1.56-2.38 3.5-4.11 3.51-1.53.02-1.93-.99-4.02-.98-2.08.01-2.52 1-4.06.97-1.72-.02-3.04-1.78-4.03-3.34C-.02 15.72-.31 10.6 1.4 7.86c1.21-1.94 3.13-3.08 4.93-3.08 1.83 0 2.98 1.01 4.5 1.01 1.47 0 2.36-1.01 4.48-1.01 1.6 0 3.3.87 4.51 2.38-3.96 2.17-3.32 7.83.78 9.86z"/></svg>
          <span class="txt"><small>İndir</small>App Store</span>
        </a>
        <a class="badge" id="btnAndroid" href="#">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3.6 20.9 12 12.5l2.8 2.8-8.1 8.1c-.5.5-1.3.5-1.9.1l-1.2-2.6zM17.9 9.9l2.6 1.5c.9.5.9 1.7 0 2.2l-2.6 1.5-3.1-3.1 3.1-3.1zM3.6 3.1l1.2-.7c.6-.4 1.4-.4 1.9.1l8.1 8.1L12 11.5 3.6 3.1zM3 4.4 11.2 12 3 19.6c-.2-.3-.3-.6-.3-1V5.4c0-.4.1-.7.3-1z"/></svg>
          <span class="txt"><small>İndir</small>Google Play</span>
        </a>
      </div>

      <div class="qr-wrap">
        <p>📱 Telefonunla bu kodu okut, doğru mağaza otomatik açılsın</p>
        <div id="qr"></div>
      </div>
    </div>

    <footer id="foot"></footer>
  </main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
(function(){
  const ua = navigator.userAgent || "";
  const isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1); // iPadOS
  const isAndroid = /android/i.test(ua);

  // --- Reklam parametrelerini mağaza linkine taşı ---
  function withParams(storeUrl){
    if(!CONFIG.passThroughParams) return storeUrl;
    const incoming = window.location.search.replace(/^\?/, "");
    if(!incoming) return storeUrl;
    return storeUrl + (storeUrl.includes("?") ? "&" : "?") + incoming;
  }
  const iosLink     = withParams(CONFIG.iosUrl);
  const androidLink = withParams(CONFIG.androidUrl);

  // --- İçeriği doldur ---
  document.title = CONFIG.appName + " — İndir";
  document.getElementById("appName").textContent = CONFIG.appName;
  document.getElementById("tagline").textContent = CONFIG.tagline;

  const iconEl = document.getElementById("appIcon");
  if(CONFIG.iconUrl){
    const im = new Image(); im.src = CONFIG.iconUrl; im.alt = CONFIG.appName;
    iconEl.appendChild(im);
  } else {
    iconEl.textContent = (CONFIG.appName.trim()[0] || "?").toUpperCase();
  }

  const foot = document.getElementById("foot");
  const host = window.location.hostname || "";
  foot.textContent = host ? host : "";

  // --- Mobil: otomatik yönlendir ---
  if(isIOS || isAndroid){
    const target = isIOS ? iosLink : androidLink;
    document.getElementById("redirecting").style.display = "block";
    document.getElementById("manualLink").href = target;
    setTimeout(function(){ window.location.replace(target); }, CONFIG.redirectDelay);
    return;
  }

  // --- Masaüstü / bilinmeyen: iki buton + QR ---
  document.getElementById("stores").style.display = "block";
  document.getElementById("btnIos").href = iosLink;
  document.getElementById("btnAndroid").href = androidLink;

  // QR = bu sayfanın kendi URL'i (parametreler dahil), telefon açınca yeniden yönlenir
  try {
    new QRCode(document.getElementById("qr"), {
      text: window.location.href,
      width: 130, height: 130,
      colorDark: "#0d1220", colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e){ /* QR kütüphanesi yüklenmediyse sessiz geç */ }
})();
</script>
</body>
</html>
